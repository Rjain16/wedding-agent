services:
  - type: web
    name: wedding-embed-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app   # update after Vercel deploy
    autoDeploy: true
